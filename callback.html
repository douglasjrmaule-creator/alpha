<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Scanner - Autorizando</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D1117; color: #E6EDF3; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #161B22; border: 1px solid #30363D; border-radius: 12px; padding: 36px 40px; text-align: center; max-width: 380px; width: 90%; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #00C853; box-shadow: 0 0 10px #00C853; margin: 0 auto 20px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
p { font-size: 13px; color: #8B949E; line-height: 1.6; }
.st { margin-top: 20px; font-size: 12px; font-family: monospace; color: #00C853; }
.err { color: #FF4444; }
</style>
</head>
<body>
<div class="card">
  <div class="dot" id="dot"></div>
  <h2 id="title">Autorizando...</h2>
  <p id="desc">Aguarde enquanto trocamos o codigo pelo token.</p>
  <div class="st" id="status">Iniciando...</div>
</div>
<script>
(async()=>{
  const p=new URLSearchParams(location.search);
  const code=p.get('code'),error=p.get('error'),stateRaw=p.get('state')||'';
  let wu='',ci='';
  try{const decoded=JSON.parse(atob(decodeURIComponent(stateRaw)));wu=decoded.w||'';ci=decoded.c||'';}catch(e){}
  const T=i=>document.getElementById(i);
  function fail(m){
    T('dot').style.cssText='background:#FF4444;box-shadow:0 0 10px #FF4444;animation:none;width:10px;height:10px;border-radius:50%;margin:0 auto 20px';
    T('title').textContent='Erro';T('desc').textContent=m;T('status').textContent='';T('status').className='st err';
    if(window.opener)window.opener.postMessage({type:'ML_AUTH_ERROR',message:m},'*');
  }
  if(error){fail('ML retornou: '+error);return;}
  if(!code){fail('Codigo nao encontrado.');return;}
  if(!wu){fail('Worker URL nao encontrado. Feche e tente novamente.');return;}
  T('status').textContent='Comunicando com o Worker...';
  try{
    const r=await fetch(wu+'/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({grant_type:'authorization_code',code,redirect_uri:location.origin+location.pathname,client_id:ci})});
    if(!r.ok){const t=await r.text();throw new Error('Worker '+r.status+': '+t);}
    const d=await r.json();
    if(!d.access_token)throw new Error('Token nao retornado.');
    T('status').textContent='Token obtido!';
    T('dot').style.animation='none';
    T('title').textContent='Autorizado!';
    T('desc').textContent='Esta janela vai fechar automaticamente.';
    if(window.opener)window.opener.postMessage({type:'ML_AUTH_SUCCESS',access_token:d.access_token,user_id:d.user_id,expires_in:d.expires_in},'*');
    setTimeout(()=>window.close(),800);
  }catch(e){fail(e.message);}
})();
</script>
</body>
</html>
