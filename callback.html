<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Alpha Scanner - Autorizando</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D1117; color: #E6EDF3; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: #161B22; border: 1px solid #30363D; border-radius: 12px; padding: 36px 40px; text-align: center; max-width: 380px; width: 90%; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #00C853; box-shadow: 0 0 10px #00C853; margin: 0 auto 20px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
h2 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
p { font-size: 13px; color: #8B949E; line-height: 1.6; }
.st { margin-top: 20px; font-size: 12px; font-family: monospace; color: #00C853; }
.err { color: #FF4444; }
</style>
</head>
<body>
<div class="card">
  <div class="dot" id="dot"></div>
  <h2 id="title">Autorizando...</h2>
  <p id="desc">Retornando ao app.</p>
  <div class="st" id="status">Aguarde...</div>
</div>
<script>
(()=>{
  const p=new URLSearchParams(location.search);
  const code=p.get('code'),error=p.get('error');
  const T=i=>document.getElementById(i);
  function fail(m){
    T('dot').style.cssText='background:#FF4444;box-shadow:0 0 10px #FF4444;animation:none;width:10px;height:10px;border-radius:50%;margin:0 auto 20px';
    T('title').textContent='Erro';T('desc').textContent=m;T('status').textContent='';T('status').className='st err';
    if(window.opener)window.opener.postMessage({type:'ML_AUTH_ERROR',message:m},'*');
  }
  if(error){fail('ML retornou: '+error);return;}
  if(!code){fail('Codigo nao encontrado na URL.');return;}
  T('status').textContent='Codigo recebido! Retornando ao app...';
  T('dot').style.animation='none';
  T('title').textContent='Quase la!';
  // Envia apenas o code de volta — o app troca pelo token via Worker
  if(window.opener){
    window.opener.postMessage({type:'ML_AUTH_CODE',code:code},'*');
    setTimeout(()=>window.close(),600);
  } else {
    T('desc').textContent='Popup fechado. Copie o codigo: '+code;
  }
})();
</script>
</body>
</html>
